<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StressMap — Exam Stress Check-In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg-deep:#1B0F2E;
    --bg-mid:#2A1B4D;
    --paper:#FAF9FF;
    --card-border:#E7E5F5;
    --ink:#171623;
    --ink-soft:#65637A;
    --line:#E7E5F5;
    --teal:#6366F1;
    --teal-dark:#4338CA;
    --marigold:#F59E0B;
    --coral:#F5455C;
    --emerald:#10B981;
    --radius:22px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  ::selection{background:var(--teal); color:#fff;}
  ::-webkit-scrollbar{width:10px; height:10px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.18); border-radius:99px;}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.3);}
  body{
    min-height:100vh;
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:28px 16px;
    position:relative;
    overflow-x:hidden;
    background:
      radial-gradient(circle at 12% 12%, rgba(99,102,241,0.38), transparent 42%),
      radial-gradient(circle at 90% 8%, rgba(245,158,11,0.24), transparent 46%),
      radial-gradient(circle at 50% 100%, rgba(245,69,92,0.22), transparent 55%),
      linear-gradient(160deg, #0A0710 0%, var(--bg-deep) 38%, var(--bg-mid) 72%, #170B2B 100%);
    background-attachment:fixed;
    background-repeat:no-repeat;
    background-size:200% 200%;
    animation:auroraDrift 22s ease-in-out infinite;
  }
  @keyframes auroraDrift{
    0%{background-position:0% 0%;}
    50%{background-position:100% 40%;}
    100%{background-position:0% 0%;}
  }
  #galaxy{
    position:fixed; inset:0; width:100%; height:100%;
    z-index:0; pointer-events:none; display:block;
  }
  #scene{
    position:fixed; inset:0; width:100%; height:100%;
    z-index:0; pointer-events:none;
    opacity:0.85;
    filter:hue-rotate(-18deg) saturate(1.15);
    mix-blend-mode:screen;
  }
  #app{ position:relative; z-index:1; }
  h1,h2,h3{font-family:'Space Grotesk', sans-serif; margin:0;}
  .mono{font-family:'IBM Plex Mono', monospace;}
  #app{width:100%; max-width:540px;}
  .card{
    background:rgba(250,249,255,0.90);
    backdrop-filter:blur(22px) saturate(150%);
    -webkit-backdrop-filter:blur(22px) saturate(150%);
    border:1px solid rgba(255,255,255,0.5);
    border-radius:var(--radius);
    padding:clamp(24px,5vw,36px) clamp(20px,5vw,32px);
    box-shadow:0 1px 1px rgba(255,255,255,0.6) inset, 0 1px 2px rgba(0,0,0,0.10), 0 40px 90px rgba(10,4,30,0.55), 0 0 0 1px rgba(99,102,241,0.08);
    position:relative;
    animation:fadeSlide .5s cubic-bezier(.22,1,.36,1);
  }
  @keyframes fadeSlide{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
  }
  .eyebrow{
    text-transform:uppercase;
    letter-spacing:.14em;
    font-size:11px;
    font-weight:600;
    color:var(--teal-dark);
  }
  .brand{
    display:flex; align-items:center; gap:10px; margin-bottom:6px;
  }
  .brand .dot{
    width:11px;height:11px;border-radius:3px;
    background:var(--marigold);
    box-shadow:0 0 0 4px rgba(245,158,11,.25);
    transform:rotate(45deg);
  }
  .brand h1{font-size:clamp(20px,4.5vw,25px); letter-spacing:-.01em;}
  .sub{color:var(--ink-soft); font-size:14.5px; line-height:1.55; margin-top:6px;}
  .tabs{display:flex; gap:6px; margin-top:20px; background:#EFEEFA; padding:5px; border-radius:14px;}
  .tab{
    flex:1; text-align:center; padding:10px 8px; border-radius:10px; cursor:pointer;
    font-weight:600; font-size:13.5px; color:var(--ink-soft); transition:background .15s, color .15s;
    font-family:'Space Grotesk', sans-serif;
  }
  .tab.active{background:var(--paper); color:var(--teal-dark); box-shadow:0 1px 3px rgba(0,0,0,.08);}
  label{display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin:18px 0 6px; text-transform:uppercase; letter-spacing:.06em;}
  input[type=text], input[type=tel], input[type=password]{
    width:100%; padding:13px 14px; border-radius:12px;
    border:1.5px solid var(--line); background:#FDFCFF;
    font-family:'IBM Plex Sans', sans-serif; font-size:15px; color:var(--ink);
    outline:none; transition:border-color .15s, box-shadow .15s;
  }
  input:focus{border-color:var(--teal); box-shadow:0 0 0 3px rgba(99,102,241,.15);}
  .btn{
    width:100%; margin-top:22px; padding:14px 16px;
    background:linear-gradient(135deg, var(--teal), var(--teal-dark)); color:#fff; border:none; border-radius:12px;
    font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:15.5px;
    cursor:pointer; transition:transform .15s ease, box-shadow .15s ease, background .2s ease;
    letter-spacing:.01em;
    box-shadow:0 8px 20px rgba(67,56,202,0.35);
  }
  .btn:hover{background:linear-gradient(135deg, var(--teal-dark), var(--teal)); transform:translateY(-1px); box-shadow:0 12px 26px rgba(67,56,202,0.42);}
  .btn:active{transform:scale(0.98) translateY(0); box-shadow:0 4px 12px rgba(67,56,202,0.3);}
  .btn.secondary{background:transparent; color:var(--teal-dark); border:1.5px solid var(--teal); box-shadow:none;}
  .btn.secondary:hover{background:rgba(99,102,241,.08); transform:translateY(-1px); box-shadow:0 6px 16px rgba(99,102,241,0.18);}
  .btn.ghost{background:transparent; color:var(--ink-soft); border:1.5px solid var(--line); box-shadow:none;}
  .btn.ghost:hover{border-color:var(--coral); color:var(--coral); transform:translateY(-1px); box-shadow:none;}
  .btn:disabled{opacity:.45; cursor:not-allowed; transform:none; box-shadow:none;}
  .error{color:var(--coral); font-size:13px; margin-top:8px; min-height:16px;}
  .option-list{display:flex; flex-direction:column; gap:10px; margin-top:18px;}
  .option{
    text-align:left; padding:14px 16px; border-radius:14px;
    border:1.5px solid var(--line); background:#FDFCFF;
    font-size:15px; color:var(--ink); cursor:pointer;
    transition:border-color .15s, background .15s, transform .12s, box-shadow .15s;
  }
  .option:hover{border-color:var(--teal); background:#EEF0FF; transform:translateY(-1px); box-shadow:0 6px 14px rgba(99,102,241,0.18);}
  .option:active{transform:scale(0.985);}
  .progress-wrap{display:flex; align-items:center; gap:10px; margin-bottom:18px;}
  .progress-track{flex:1; height:8px; border-radius:99px; background:var(--line); overflow:hidden;}
  .progress-fill{height:100%; background:linear-gradient(90deg, var(--teal), var(--marigold)); transition:width .35s ease;}
  .qcount{font-family:'IBM Plex Mono', monospace; font-size:12.5px; color:var(--ink-soft); white-space:nowrap;}
  .cat-tag{
    display:inline-flex; align-items:center; gap:6px;
    font-size:12px; font-weight:600; color:var(--teal-dark);
    background:rgba(99,102,241,.10); padding:5px 10px; border-radius:99px; margin-bottom:14px;
  }
  .qtext{font-size:clamp(17px,3.6vw,19px); line-height:1.4; font-weight:600; font-family:'Space Grotesk', sans-serif;}
  .card.question-zoom{ animation:questionZoom .55s cubic-bezier(.2,1.4,.4,1); transform-origin:center center; }
  @keyframes questionZoom{
    0%{ opacity:0; transform:scale(.78) translateY(14px); filter:blur(6px); }
    55%{ opacity:1; filter:blur(0); }
    100%{ opacity:1; transform:scale(1) translateY(0); filter:blur(0); }
  }
  .progress-track{ position:relative; }
  .progress-fill{ position:relative; box-shadow:0 0 10px 1px rgba(99,102,241,0.55); }
  .progress-fill::after{
    content:''; position:absolute; right:-2px; top:50%; transform:translateY(-50%);
    width:8px; height:8px; border-radius:50%; background:#fff;
    box-shadow:0 0 8px 3px rgba(255,255,255,0.9);
  }
  .exam-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:18px;}
  .exam-opt{
    padding:16px 10px; text-align:center; border-radius:14px;
    border:1.5px solid var(--line); background:#FDFCFF; cursor:pointer; font-weight:600;
    transition:border-color .15s, background .15s, transform .12s, box-shadow .15s;
  }
  .exam-opt:hover{border-color:var(--marigold); background:#FFF4E0; transform:translateY(-1px); box-shadow:0 6px 14px rgba(245,158,11,0.18);}
  .pulse-wrap{display:flex; justify-content:center; margin:14px 0 6px;}
  .loading-text{text-align:center; color:var(--ink-soft); font-size:14px; margin-top:10px;}
  .result-header{text-align:center; margin-bottom:10px;}
  .grade-badge{
    display:inline-block; margin-top:8px; padding:8px 22px; border-radius:99px;
    font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:20px; color:#fff;
  }
  .stress-pct{font-family:'IBM Plex Mono', monospace; font-size:13px; color:var(--ink-soft); margin-top:6px;}
  table.marksheet{width:100%; border-collapse:collapse; margin-top:18px; font-size:14px;}
  table.marksheet th{
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.06em;
    color:var(--ink-soft); padding:6px 4px; border-bottom:2px solid var(--line);
  }
  table.marksheet td{padding:10px 4px; border-bottom:1px solid var(--line); vertical-align:middle;}
  .bar-track{background:var(--line); border-radius:99px; height:7px; width:100%; overflow:hidden;}
  .bar-fill{height:100%; border-radius:99px;}
  .remarks{
    margin-top:20px; padding:14px 16px; background:#EEF0FF; border-radius:14px;
    font-size:14px; line-height:1.6; color:var(--ink);
  }
  .tips-list{margin:10px 0 0; padding-left:18px; font-size:14px; line-height:1.7; color:var(--ink);}
  .yt-card{
    display:flex; align-items:center; gap:12px; padding:9px; margin-top:10px;
    border:1.5px solid var(--line); border-radius:16px; text-decoration:none; color:var(--ink);
    background:#FDFCFF;
    transition:border-color .18s, background .18s, transform .18s, box-shadow .18s;
  }
  .yt-card:hover{border-color:var(--coral); background:#FFF0F2; transform:translateY(-2px); box-shadow:0 10px 22px rgba(245,69,92,0.16);}
  .yt-thumb{
    flex-shrink:0; width:104px; height:64px; border-radius:10px; overflow:hidden;
    position:relative; background:#171623;
  }
  .yt-thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .yt-play{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  }
  .yt-play span{
    width:30px; height:30px; border-radius:50%; background:rgba(0,0,0,0.55);
    display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px;
    transition:transform .18s, background .18s; backdrop-filter:blur(1px);
  }
  .yt-card:hover .yt-play span{ transform:scale(1.15); background:var(--coral); }
  .yt-icon{
    flex-shrink:0; width:34px; height:34px; border-radius:9px; background:var(--coral);
    display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px;
  }
  .yt-title{font-size:13.5px; font-weight:600; line-height:1.35;}
  .yt-sub{font-size:11.5px; color:var(--ink-soft); margin-top:3px; display:flex; align-items:center; gap:4px;}
  .yt-sub svg{flex-shrink:0;}
  .footer-note{font-size:12px; color:var(--ink-soft); line-height:1.6; margin-top:22px; padding-top:16px; border-top:1px solid var(--line);}
  canvas{max-width:100%;}
  .dash-row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .history-item{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:12px 14px; border:1.5px solid var(--line); border-radius:14px; margin-top:10px; background:#FDFCFF;
  }
  .history-left{font-size:13.5px;}
  .history-date{color:var(--ink-soft); font-size:11.5px; margin-top:2px;}
  .mini-badge{
    font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:13px; color:#fff;
    padding:4px 12px; border-radius:99px;
  }
  .empty-hist{color:var(--ink-soft); font-size:13.5px; margin-top:14px; text-align:center; padding:18px 10px; border:1.5px dashed var(--line); border-radius:14px;}
  .routine-card{margin-top:16px; padding:14px 16px; background:#FDFCFF; border:1.5px solid var(--line); border-radius:14px;}
  table.routine{width:100%; border-collapse:collapse; font-size:13px; margin-top:8px;}
  table.routine td{padding:7px 4px; border-bottom:1px solid var(--line); vertical-align:top;}
  table.routine td.time{width:120px; color:var(--teal-dark); font-family:'IBM Plex Mono', monospace; font-weight:600; white-space:nowrap;}
  .routine-note{margin-top:12px; font-size:13px; line-height:1.6; color:var(--ink-soft); padding-top:10px; border-top:1px dashed var(--line);}
  .boost-card{
    margin-top:10px; padding:12px; border-radius:18px; text-decoration:none; display:flex; gap:14px; align-items:center;
    background:linear-gradient(135deg, rgba(99,102,241,0.14), rgba(245,158,11,0.14));
    border:1.5px solid var(--marigold); color:var(--ink); transition:transform .18s ease, box-shadow .18s ease;
  }
  .boost-card:hover{transform:translateY(-2px); box-shadow:0 10px 24px rgba(245,158,11,0.22);}
  .boost-thumb{
    flex-shrink:0; width:120px; height:74px; border-radius:12px; overflow:hidden; position:relative; background:#171623;
  }
  .boost-thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .boost-thumb .yt-play span{width:32px; height:32px; font-size:12px;}
  .boost-title{font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:15px;}
  .boost-sub{font-size:12.5px; color:var(--ink-soft); margin-top:3px;}
  @media (max-width:480px){
    .qtext{font-size:17px;}
  }
  @media (prefers-reduced-motion: reduce){
    body{animation:none;}
    .card{animation:none;}
    .card.question-zoom{animation:none;}
  }
</style>
</head>
<body>
<canvas id="galaxy" aria-hidden="true"></canvas>
<div id="scene" aria-hidden="true">
<svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMax slice" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDF3D3" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#F59E0B" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auraGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g fill="#FFFFFF" opacity="0.5">
    <circle cx="120" cy="90" r="2"/><circle cx="260" cy="150" r="1.5"/>
    <circle cx="340" cy="60" r="2"/><circle cx="520" cy="120" r="1.5"/>
    <circle cx="700" cy="70" r="2"/><circle cx="860" cy="140" r="1.5"/>
    <circle cx="980" cy="90" r="2"/><circle cx="1100" cy="160" r="1.5"/>
    <circle cx="60" cy="220" r="1.2"/><circle cx="1150" cy="230" r="1.2"/>
  </g>

  <circle cx="980" cy="130" r="140" fill="url(#moonGlow)"/>
  <circle cx="980" cy="130" r="34" fill="#FCF6E3"/>

  <path d="M0,560 Q200,500 420,540 T900,520 T1200,560 L1200,800 L0,800 Z" fill="#241847" opacity="0.55"/>
  <path d="M0,610 Q220,560 460,600 T940,580 T1200,610 L1200,800 L0,800 Z" fill="#170B2B" opacity="0.7"/>

  <circle cx="600" cy="640" r="190" fill="url(#auraGlow)"/>

  <g fill="#F5455C" opacity="0.5">
    <ellipse cx="420" cy="330" rx="7" ry="4" transform="rotate(30 420 330)"/>
    <ellipse cx="760" cy="280" rx="6" ry="3.5" transform="rotate(-20 760 280)"/>
    <ellipse cx="880" cy="420" rx="7" ry="4" transform="rotate(50 880 420)"/>
    <ellipse cx="320" cy="450" rx="6" ry="3.5" transform="rotate(-40 320 450)"/>
  </g>

  <g transform="translate(600,560)">
    <ellipse cx="0" cy="150" rx="120" ry="14" fill="#12081F" opacity="0.35"/>
    <path d="M-90,130 Q-40,90 0,110 Q40,90 90,130 Q40,150 0,140 Q-40,150 -90,130 Z" fill="#4338CA"/>
    <path d="M-70,120 Q-80,20 0,-10 Q80,20 70,120 Z" fill="#6366F1"/>
    <circle cx="0" cy="-45" r="46" fill="#FCF6E3"/>
    <path d="M-18,-42 Q-12,-36 -6,-42" stroke="#171623" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M6,-42 Q12,-36 18,-42" stroke="#171623" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-6,-24 Q0,-20 6,-24" stroke="#171623" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M-46,-52 Q0,-100 46,-52 Q46,-78 0,-88 Q-46,-78 -46,-52 Z" fill="#171623"/>
    <circle cx="-38" cy="95" r="14" fill="#FCF6E3"/>
    <circle cx="38" cy="95" r="14" fill="#FCF6E3"/>
  </g>
</svg>
</div>
<div id="app"></div>

<script>
/* ============ GALAXY PARTICLE BACKGROUND (canvas, no external assets) ============ */
(function(){
  const canvas = document.getElementById('galaxy');
  const ctx = canvas.getContext('2d');
  const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  let W=0, H=0, DPR=1;
  let particles = [];
  let drifters = [];
  let mouseX = 0.5, mouseY = 0.5;
  let targetMouseX = 0.5, targetMouseY = 0.5;
  let t0 = performance.now();

  function resize(){
    DPR = Math.min(window.devicePixelRatio||1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W*DPR; canvas.height = H*DPR;
    canvas.style.width = W+'px'; canvas.style.height = H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    buildGalaxy();
  }

  function buildGalaxy(){
    const count = Math.max(90, Math.min(240, Math.round((W*H)/9000)));
    const cx = W*0.72, cy = H*0.22; // galaxy core sits upper-right, echoing the moon
    const arms = 3;
    particles = [];
    for(let i=0;i<count;i++){
      const armIndex = i % arms;
      const armOffset = (armIndex/arms) * Math.PI*2;
      const dist = Math.pow(Math.random(), 0.55) * (Math.max(W,H)*0.62);
      const spin = dist * 0.006;
      const angle = armOffset + spin + (Math.random()-0.5)*0.9;
      const hueSet = [ '99,102,241', '245,158,11', '245,69,92', '255,255,255', '16,185,129' ];
      particles.push({
        cx, cy, dist, angle,
        baseAngle: angle,
        speed: (0.00006 + Math.random()*0.00010) * (Math.random()<0.5?1:-1),
        r: Math.random()*1.6 + 0.4,
        color: hueSet[Math.floor(Math.random()*hueSet.length)],
        twinklePhase: Math.random()*Math.PI*2,
        twinkleSpeed: 0.0012 + Math.random()*0.0022,
        parallax: 6 + Math.random()*22
      });
    }
    // a few slow independent drifting motes across the whole viewport for depth
    drifters = [];
    const driftCount = Math.round(count*0.25);
    for(let i=0;i<driftCount;i++){
      drifters.push({
        x: Math.random()*W, y: Math.random()*H,
        vx: (Math.random()-0.5)*0.012, vy: (Math.random()-0.5)*0.008,
        r: Math.random()*1.2+0.3, o: Math.random()*0.5+0.15
      });
    }
  }

  function frame(now){
    const dt = now - t0; t0 = now;
    ctx.clearRect(0,0,W,H);

    mouseX += (targetMouseX-mouseX)*0.02;
    mouseY += (targetMouseY-mouseY)*0.02;
    const px = (mouseX-0.5), py = (mouseY-0.5);

    // galaxy core glow
    const cx = W*0.72 + px*10, cy = H*0.22 + py*8;
    const coreGrad = ctx.createRadialGradient(cx,cy,0, cx,cy, Math.max(W,H)*0.28);
    coreGrad.addColorStop(0, 'rgba(99,102,241,0.16)');
    coreGrad.addColorStop(0.5, 'rgba(99,102,241,0.05)');
    coreGrad.addColorStop(1, 'rgba(99,102,241,0)');
    ctx.fillStyle = coreGrad;
    ctx.fillRect(0,0,W,H);

    particles.forEach(p=>{
      if(!reduceMotion){ p.angle = p.baseAngle + now*p.speed; }
      const x = cx + Math.cos(p.angle)*p.dist + px*p.parallax;
      const y = cy + Math.sin(p.angle)*p.dist*0.55 + py*p.parallax*0.6;
      const tw = reduceMotion ? 0.8 : (0.55 + Math.sin(now*p.twinkleSpeed + p.twinklePhase)*0.45);
      ctx.beginPath();
      ctx.fillStyle = `rgba(${p.color},${(0.35+tw*0.5).toFixed(2)})`;
      ctx.arc(x,y,p.r*(0.8+tw*0.5),0,Math.PI*2);
      ctx.fill();
    });

    if(!reduceMotion){
      drifters.forEach(d=>{
        d.x += d.vx*dt; d.y += d.vy*dt;
        if(d.x<-10) d.x=W+10; if(d.x>W+10) d.x=-10;
        if(d.y<-10) d.y=H+10; if(d.y>H+10) d.y=-10;
        ctx.beginPath();
        ctx.fillStyle = `rgba(255,255,255,${d.o})`;
        ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
        ctx.fill();
      });
    }

    requestAnimationFrame(frame);
  }

  window.addEventListener('resize', resize, {passive:true});
  window.addEventListener('pointermove', (e)=>{
    targetMouseX = e.clientX / W; targetMouseY = e.clientY / H;
  }, {passive:true});
  window.addEventListener('deviceorientation', (e)=>{
    if(e.gamma==null) return;
    targetMouseX = Math.min(1, Math.max(0, 0.5 + e.gamma/45));
    targetMouseY = Math.min(1, Math.max(0, 0.5 + e.beta/90));
  }, {passive:true});

  resize();
  requestAnimationFrame(frame);
})();

let audioCtx = null;
function ensureAudio(){
  if(!audioCtx){ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
  if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
}
function playClick(){
  try{
    ensureAudio();
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(680, t);
    g.gain.setValueAtTime(0.05, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.07);
    o.connect(g).connect(audioCtx.destination);
    o.start(t); o.stop(t + 0.08);
  }catch(e){}
}
function playZoom(){
  try{
    ensureAudio();
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.setValueAtTime(500, t);
    filt.frequency.exponentialRampToValueAtTime(3200, t+0.22);
    o.type = 'sine';
    o.frequency.setValueAtTime(260, t);
    o.frequency.exponentialRampToValueAtTime(720, t+0.22);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.07, t+0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, t+0.26);
    o.connect(filt).connect(g).connect(audioCtx.destination);
    o.start(t); o.stop(t+0.28);
  }catch(e){}
}
function playChime(){
  try{
    ensureAudio();
    const notes = [523.25, 659.25, 783.99];
    notes.forEach((f,i)=>{
      const t = audioCtx.currentTime + i*0.18;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(f, t);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.09, t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t+0.55);
      o.connect(g).connect(audioCtx.destination);
      o.start(t); o.stop(t+0.6);
    });
  }catch(e){}
}

async function api(path, opts={}){
  const res = await fetch(path, {
    method: opts.method || 'GET',
    headers: {'Content-Type':'application/json'},
    credentials:'include',
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  let data = {};
  try{ data = await res.json(); }catch(e){}
  if(!res.ok){ throw new Error(data.error || 'Something went wrong.'); }
  return data;
}

/* ============ QUIZ LOGIC ============ */
function getCurrentQuestion(){
  const cat = categories[state.catIdx];
  let q;
  if(state.subIdx===0) q = cat.q1;
  else if(state.subIdx===1){
    const q1a = state.answers.find(a=>a.id===cat.q1.id);
    q = cat.branch.onIndex.includes(q1a.optionIndex) ? cat.branch.ifTrue : cat.branch.ifFalse;
  }
  else if(state.subIdx===2) q = cat.q3;
  else if(state.subIdx===3) q = cat.q4;
  else q = cat.q5;
  return applyPersona(q);
}

function pickExam(type){
  playClick();
  state.examType = type;
  state.screen='question';
  state.catIdx=0; state.subIdx=0; state.answers=[];
  playZoom();
  render();
}

function answerQuestion(optIdx){
  playClick();
  const q = getCurrentQuestion();
  const opt = q.options[optIdx];
  state.answers.push({ id:q.id, category:categories[state.catIdx].key, optionIndex:optIdx, label:opt.label, score:opt.score });
  if(state.subIdx<4){ state.subIdx++; }
  else if(state.catIdx<categories.length-1){ state.catIdx++; state.subIdx=0; }
  else {
    state.screen='loading';
    render();
    setTimeout(async ()=>{
      computeResults();
      await saveResultToServer();
      state.screen='result';
      playChime();
      render();
    }, 2200);
    return;
  }
  playZoom();
  render();
}

function computeResults(){
  const catScores = {};
  categories.forEach(c=>catScores[c.key]=0);
  state.answers.forEach(a=>{ catScores[a.category]+=a.score; });
  const total = Object.values(catScores).reduce((a,b)=>a+b,0);
  const pct = Math.round(total/75*100);
  let grade, gradeColor, remark;
  if(pct<=20){ grade='A+'; gradeColor='#6366F1'; remark='You\'re handling this phase with a lot of balance. Keep protecting the habits that are working for you.'; }
  else if(pct<=40){ grade='A'; gradeColor='#14B8A6'; remark='You\'re managing well overall, with a few pressure points worth watching before they build up.'; }
  else if(pct<=60){ grade='B'; gradeColor='#F59E0B'; remark='Your stress is at a moderate level. A few small, consistent changes can bring real relief.'; }
  else if(pct<=80){ grade='C'; gradeColor='#F97316'; remark='You\'re carrying a heavy load right now. Please be gentler with yourself and lean on your support system.'; }
  else { grade='D'; gradeColor='#F5455C'; remark='Your stress levels are very high. This is a good moment to talk to a trusted adult, teacher, or counsellor — you don\'t have to carry this alone.'; }
  const sortedCats = Object.entries(catScores).sort((a,b)=>b[1]-a[1]);
  results = { catScores, total, pct, grade, gradeColor, remark, topCats: sortedCats.slice(0,2).map(e=>e[0]) };
}

    ['7:30 PM', 'Dinner — try to keep this time consistent daily'],
    ['9:30 PM', 'Screens off, wind-down — reading, music, or a calm chat'],
    ['10:30 PM', 'Lights off — aim for 7.5–8 hours of sleep']
  ];
  const note = isJob
    ? 'Block one full evening a week completely offline — no work messages. Use Sunday to plan the week ahead, not to clear a backlog.'
    : 'Keep one lighter day a week (say, Sunday afternoon) for revision only — no new topics. Before a big test, add one dedicated full mock-test day, but protect your sleep window even then.';
  return { rows, note };
}

function examMotivationVideo(examType){
  const map = {
    'NEET': { id:'8-nD-NRq5xo', t:'A motivational boost for your NEET prep' },
    'JEE': { id:'E_mdmPkMl5U', t:'Daily routine of JEE toppers — a motivational boost' },
    'UPSC / Govt Exam': { id:'M9POeh5pLqQ', t:'An IAS topper\'s motivational speech for UPSC aspirants' },
    'College Student': { id:'IrHrmY4cpqo', t:'Preventing student burnout with self-care' },
    'Job / Business': { id:'Qa0n_BTzAeY', t:'A motivational reset for your work/business journey' },
    'Other': { id:'4c_xYLwOx-g', t:'3 rules for a better work-life balance' }
  };
  return map[examType] || map['Other'];
}

async function saveResultToServer(){
  try{
    await api('/api/results', {method:'POST', body:{
      examType: state.examType, total: results.total, pct: results.pct, grade: results.grade, catScores: results.catScores
    }});
    await loadHistory();
  }catch(e){ /* non-fatal — result still shown even if save fails */ }
}

function restart(){
  playClick();
  state.screen = 'examType';
  render();
}

/* ============ RENDER ============ */
function render(){
  const app = document.getElementById('app');
  if(state.screen==='loading-init') app.innerHTML = renderInitLoading();
  else if(state.screen==='auth') app.innerHTML = renderAuth();
  else if(state.screen==='dashboard') app.innerHTML = renderDashboard();
  else if(state.screen==='examType') app.innerHTML = renderExamType();
  else if(state.screen==='question') app.innerHTML = renderQuestion();
  else if(state.screen==='loading') app.innerHTML = renderLoading();
  else if(state.screen==='result'){ app.innerHTML = renderResult(); drawChart(); }
}

function renderInitLoading(){
  return `<div class="card" style="text-align:center;"><div class="loading-text">Loading StressMap…</div></div>`;
}

function renderAuth(){
  const isLogin = state.authMode === 'login';
  return `
  <div class="card">
    <div class="brand"><div class="dot"></div><h1>StressMap</h1></div>
    <div class="eyebrow">Exam Stress Check-In</div>
    <p class="sub">A quiet few-minute check-in for NEET, JEE, UPSC aspirants, college students, and working professionals — built to understand your daily life, not to judge your marks.</p>
    <div class="tabs">
      <div class="tab ${isLogin?'active':''}" onclick="setAuthMode('login')">Log in</div>
      <div class="tab ${!isLogin?'active':''}" onclick="setAuthMode('register')">Create account</div>
    </div>
    ${isLogin ? `
      <label>Name</label>
      <input type="text" id="loginName" placeholder="e.g. Aarav Sharma">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Your password">
      <div class="error">${state.authErr}</div>
      <button class="btn" onclick="doLogin()">Log in</button>
    ` : `
      <label>Name</label>
      <input type="text" id="regName" placeholder="e.g. Aarav Sharma">
      <label>Mobile number</label>
      <input type="tel" id="regMobile" placeholder="10-digit mobile number" maxlength="10">
      <label>Set password</label>
      <input type="password" id="regPassword" placeholder="At least 6 characters">
      <div class="error">${state.authErr}</div>
      <button class="btn" onclick="doRegister()">Create account</button>
    `}
  </div>`;
}

function renderDashboard(){
  const firstName = state.name.split(' ')[0];
  const histBlock = history.length ? history.map(r=>{
    const d = new Date(r.created_at);
    const dateStr = d.toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'});
    const gradeColors = {'A+':'#6366F1','A':'#14B8A6','B':'#F59E0B','C':'#F97316','D':'#F5455C'};
    return `<div class="history-item">
      <div class="history-left">
        <div><b>${r.exam_type || 'Check-in'}</b> · Stress ${r.pct}%</div>
        <div class="history-date">${dateStr}</div>
      </div>
      <div class="mini-badge" style="background:${gradeColors[r.grade]||'#65637A'}">${r.grade}</div>
    </div>`;
  }).join('') : `<div class="empty-hist">No check-ins yet. Your first one takes about 3 minutes.</div>`;

  return `
  <div class="card">
    <div class="dash-row">
      <div class="brand"><div class="dot"></div><h1>StressMap</h1></div>
      <button class="btn ghost" style="width:auto; margin:0; padding:8px 14px; font-size:13px;" onclick="doLogout()">Log out</button>
    </div>
    <div class="eyebrow">Welcome back</div>
    <h2 style="margin-top:6px;">Hi ${firstName} 👋</h2>
    <p class="sub">Ready for a fresh check-in, or take a look at how things have trended over time.</p>
    <button class="btn" onclick="pickExamScreen()">Start a new check-in</button>
    <div style="margin-top:26px;">
      <div class="eyebrow">Your history</div>
      ${histBlock}
    </div>
    <div class="footer-note">
      This is a self-reflection tool, not a medical diagnosis. If things feel heavy, please talk to a trusted adult, teacher, or counsellor — you don't have to manage this alone.
    </div>
  </div>`;
}

function pickExamScreen(){
  playClick();
  state.screen = 'examType';
  render();
}

function renderExamType(){
  const exams = ['NEET','JEE','UPSC / Govt Exam','College Student','Job / Business','Other'];
  return `
  <div class="card">
    <div class="eyebrow">Before we start</div>
    <h2 style="margin-top:6px;">Which of these fits you right now?</h2>
    <p class="sub">This just helps us tailor a couple of the questions ahead — the check-in works the same either way.</p>
    <div class="exam-grid">
      ${exams.map(e=>`<div class="exam-opt" onclick="pickExam('${e}')">${e}</div>`).join('')}
    </div>
    <button class="btn ghost" style="margin-top:18px;" onclick="goToDashboard()">Back</button>
  </div>`;
}

function renderQuestion(){
  const q = getCurrentQuestion();
  const cat = categories[state.catIdx];
  const qNum = state.catIdx*5 + state.subIdx + 1;
  const pct = Math.round((qNum-1)/25*100);
  return `
  <div class="card question-zoom">
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="qcount">${qNum}/25</div>
    </div>
    <div class="cat-tag">${cat.emoji} ${cat.title}</div>
    <div class="qtext">${q.text}</div>
    <div class="option-list">
      ${q.options.map((o,i)=>`<button class="option" onclick="answerQuestion(${i})">${o.label}</button>`).join('')}
    </div>
  </div>`;
}

function renderLoading(){
  return `
  <div class="card" style="text-align:center; padding:48px 28px;">
    <div class="pulse-wrap">
      <svg width="140" height="50" viewBox="0 0 140 50">
        <polyline points="0,25 30,25 40,8 50,42 60,25 90,25 100,12 110,38 120,25 140,25"
          fill="none" stroke="#6366F1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
          stroke-dasharray="220" stroke-dashoffset="220">
          <animate attributeName="stroke-dashoffset" from="220" to="0" dur="1.1s" repeatCount="indefinite"/>
        </polyline>
      </svg>
    </div>
    <h2>Calculating your stress index…</h2>
    <div class="loading-text">Putting together your result card, one category at a time.</div>
  </div>`;
}

function renderResult(){
  const r = results;
  const rows = categories.map(c=>{
    const score = r.catScores[c.key];
    const marks = Math.round(score/15*20);
    const pct = Math.round(score/15*100);
    const meta = catMeta[c.key];
    return `<tr>
      <td>${c.emoji} ${meta.label}</td>
      <td class="mono" style="width:56px;">${marks}/20</td>
      <td style="width:110px;"><div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${meta.color}"></div></div></td>
    </tr>`;
  }).join('');

  const tipsBlock = r.topCats.map(k=>{
    const meta = getCatData(k, state.examType);
    return `<div style="margin-top:16px;">
      <div class="eyebrow" style="color:${meta.color}">Focus area · ${meta.label}</div>
      <ul class="tips-list">${meta.tips.map(t=>`<li>${t}</li>`).join('')}</ul>
    </div>`;
  }).join('');

  const videoBlock = r.topCats.map(k=>{
    const meta = getCatData(k, state.examType);
    return meta.videos.map(v=>`
      <a class="yt-card" href="https://www.youtube.com/watch?v=${v.id}" target="_blank" rel="noopener">
        <div class="yt-thumb">
          <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" alt="" loading="lazy" onerror="this.style.display='none'">
          <div class="yt-play"><span>▶</span></div>
        </div>
        <div><div class="yt-title">${v.t}</div><div class="yt-sub"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M4 4l16 8-16 8V4z" fill="#F5455C"/></svg>Watch on YouTube</div></div>
      </a>`).join('');
  }).join('');

  const routine = generateRoutine(state.examType);
  const routineRows = routine.rows.map(([time, activity])=>`<tr><td class="time">${time}</td><td>${activity}</td></tr>`).join('');
  const boost = examMotivationVideo(state.examType);

  return `
  <div class="card">
    <div class="result-header">
      <div class="eyebrow">${state.examType} Stress Result Card</div>
      <h2 style="margin-top:4px;">${state.name.split(' ')[0]}'s Check-In</h2>
      <div class="grade-badge" style="background:${r.gradeColor}">${r.grade}</div>
      <div class="stress-pct">Stress Index: ${r.pct}%</div>
    </div>

    <canvas id="resultChart" height="220"></canvas>

    <table class="marksheet">
      <thead><tr><th>Category</th><th>Marks</th><th>Level</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>

    <div class="remarks"><b>Remarks:</b> ${r.remark}</div>

    ${tipsBlock}

    <div style="margin-top:20px;">
      <div class="eyebrow">Suggested for you</div>
      ${videoBlock}
    </div>

    <div style="margin-top:22px;">
      <div class="eyebrow">Your weekly reset routine</div>
      <div class="routine-card">
        <table class="routine"><tbody>${routineRows}</tbody></table>
        <div class="routine-note">${routine.note}</div>
      </div>
    </div>

    <div style="margin-top:20px;">
      <div class="eyebrow">One more thing</div>
      <a class="boost-card" href="https://www.youtube.com/watch?v=${boost.id}" target="_blank" rel="noopener">
        <div class="boost-thumb">
          <img src="https://img.youtube.com/vi/${boost.id}/mqdefault.jpg" alt="" loading="lazy" onerror="this.style.display='none'">
          <div class="yt-play"><span>▶</span></div>
        </div>
        <div><div class="boost-title">🔥 ${boost.t}</div><div class="boost-sub">Watch on YouTube</div></div>
      </a>
    </div>

    <div class="footer-note">
      This is a self-reflection tool, not a medical diagnosis. If things feel heavy, please talk to a trusted adult, teacher, or counsellor — you don't have to manage this alone.
    </div>

    <button class="btn secondary" style="margin-top:18px;" onclick="restart()">Take the check-in again</button>
    <button class="btn ghost" onclick="goToDashboard()">Back to dashboard</button>
  </div>`;
}

let chartInstance = null;
function drawChart(){
  const ctx = document.getElementById('resultChart');
  if(!ctx || !window.Chart) return;
  if(chartInstance){ chartInstance.destroy(); }
  chartInstance = new Chart(ctx, {
    type:'radar',
    data:{
      labels: categories.map(c=>c.title),
      datasets:[{
        label:'Stress level',
        data: categories.map(c=> Math.round(results.catScores[c.key]/15*100)),
        backgroundColor:'rgba(245,69,92,0.15)',
        borderColor:'#F5455C',
        pointBackgroundColor:'#F5455C',
        borderWidth:2
      }]
    },
    options:{
      responsive:true,
      plugins:{ legend:{display:false} },
      scales:{ r:{ min:0, max:100, ticks:{ display:false }, grid:{ color:'#E7E5F5' }, angleLines:{ color:'#E7E5F5' },
        pointLabels:{ font:{ size:10.5, family:'IBM Plex Sans' }, color:'#65637A' } } }
    }
  });
}

checkSession();
</script>
</body>
</html>
