<style>

  *{box-sizing:border-box;}

/* ============ AUDIO (no external files — generated in-browser) ============ */
let audioCtx = null;
function ensureAudio(){
  if(!audioCtx){ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
  if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
}
function playClick(){
  try{
    ensureAudio();
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(680, t);
    g.gain.setValueAtTime(0.05, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.07);
    o.connect(g).connect(audioCtx.destination);
    o.start(t); o.stop(t + 0.08);
  }catch(e){}
}
function playChime(){
  try{
    ensureAudio();
    const notes = [523.25, 659.25, 783.99];
    notes.forEach((f,i)=>{
      const t = audioCtx.currentTime + i*0.18;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(f, t);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.09, t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t+0.55);
      o.connect(g).connect(audioCtx.destination);
      o.start(t); o.stop(t+0.6);
    });
  }catch(e){}
}

/* ============ STATE ============ */
let state = {
  screen:'loading-init',
  authMode:'login',
  name:'', mobile:'',
  authErr:'',
  examType:'',
  catIdx:0, subIdx:0,
  answers:[]
};
let history = [];
let results = null;

/* ============ API HELPERS ============ */
async function api(path, opts={}){
  const res = await fetch(path, {
    method: opts.method || 'GET',
    headers: {'Content-Type':'application/json'},
    credentials:'include',
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  let data = {};
  try{ data = await res.json(); }catch(e){}
  if(!res.ok){ throw new Error(data.error || 'Something went wrong.'); }
  return data;
}

async function checkSession(){
  try{
    const me = await api('/api/me');
    state.name = me.name; state.mobile = me.mobile;
    await loadHistory();
    state.screen = 'dashboard';
  }catch(e){
    state.screen = 'auth';
  }
  render();
}

async function loadHistory(){
  try{
    const data = await api('/api/results');
    history = data.results || [];
  }catch(e){ history = []; }
}

/* ============ AUTH ACTIONS ============ */
function setAuthMode(mode){
  playClick();
  state.authMode = mode;
  state.authErr = '';
  render();
}

async function doRegister(){
  playClick();
  const name = document.getElementById('regName').value.trim();
  const mobile = document.getElementById('regMobile').value.trim();
  const password = document.getElementById('regPassword').value;
  if(!name){ state.authErr='Please enter your name.'; render(); return; }
  if(!/^[6-9]\d{9}$/.test(mobile)){ state.authErr='Enter a valid 10-digit mobile number.'; render(); return; }
  if(password.length<6){ state.authErr='Password must be at least 6 characters.'; render(); return; }
  try{
    const user = await api('/api/register', {method:'POST', body:{name, mobile, password}});
    state.name = user.name; state.mobile = user.mobile; state.authErr='';
    await loadHistory();
    state.screen = 'dashboard';
    render();
  }catch(e){
    state.authErr = e.message; render();
  }
}

async function doLogin(){
  playClick();
  const name = document.getElementById('loginName').value.trim();
  const password = document.getElementById('loginPassword').value;
  if(!name || !password){ state.authErr='Enter your name and password.'; render(); return; }
  try{
    const user = await api('/api/login', {method:'POST', body:{name, password}});
    state.name = user.name; state.mobile = user.mobile; state.authErr='';
    await loadHistory();
    state.screen = 'dashboard';
    render();
  }catch(e){
    state.authErr = e.message; render();
  }
}

async function doLogout(){
  playClick();
  try{ await api('/api/logout', {method:'POST'}); }catch(e){}
  state = { screen:'auth', authMode:'login', name:'', mobile:'', authErr:'', examType:'', catIdx:0, subIdx:0, answers:[] };
  history = []; results = null;
  render();
}

function goToDashboard(){
  playClick();
  state.screen = 'dashboard';
  loadHistory().then(render);
}

/* ============ QUIZ LOGIC ============ */
function getCurrentQuestion(){
  const cat = categories[state.catIdx];
  if(state.subIdx===0) return cat.q1;
  if(state.subIdx===1){
    const q1a = state.answers.find(a=>a.id===cat.q1.id);
    return cat.branch.onIndex.includes(q1a.optionIndex) ? cat.branch.ifTrue : cat.branch.ifFalse;
  }
  if(state.subIdx===2) return cat.q3;
  if(state.subIdx===3) return cat.q4;
  return cat.q5;
}

function pickExam(type){
  playClick();
  state.examType = type;
  state.screen='question';
  state.catIdx=0; state.subIdx=0; state.answers=[];
  render();
}

function answerQuestion(optIdx){
  playClick();
  const q = getCurrentQuestion();
  const opt = q.options[optIdx];
  state.answers.push({ id:q.id, category:categories[state.catIdx].key, optionIndex:optIdx, label:opt.label, score:opt.score });
  if(state.subIdx<4){ state.subIdx++; }
  else if(state.catIdx<categories.length-1){ state.catIdx++; state.subIdx=0; }
  else {
    state.screen='loading';
    render();
    setTimeout(async ()=>{
      computeResults();
      await saveResultToServer();
      state.screen='result';
      playChime();
      render();
    }, 2200);
    return;
  }
  render();
}

function computeResults(){
  const catScores = {};
  categories.forEach(c=>catScores[c.key]=0);
  state.answers.forEach(a=>{ catScores[a.category]+=a.score; });
  const total = Object.values(catScores).reduce((a,b)=>a+b,0);
  const pct = Math.round(total/75*100);
  let grade, gradeColor, remark;
  if(pct<=20){ grade='A+'; gradeColor='#2FAF98'; remark='You\'re handling this phase with a lot of balance. Keep protecting the habits that are working for you.'; }
  else if(pct<=40){ grade='A'; gradeColor='#4E9E76'; remark='You\'re managing well overall, with a few pressure points worth watching before they build up.'; }
  else if(pct<=60){ grade='B'; gradeColor='#F5A93C'; remark='Your stress is at a moderate level. A few small, consistent changes can bring real relief.'; }
  else if(pct<=80){ grade='C'; gradeColor='#D9762E'; remark='You\'re carrying a heavy load right now. Please be gentler with yourself and lean on your support system.'; }
  else { grade='D'; gradeColor='#EF6F6C'; remark='Your stress levels are very high. This is a good moment to talk to a trusted adult, teacher, or counsellor — you don\'t have to carry this alone.'; }
  const sortedCats = Object.entries(catScores).sort((a,b)=>b[1]-a[1]);
  results = { catScores, total, pct, grade, gradeColor, remark, topCats: sortedCats.slice(0,2).map(e=>e[0]) };
}

async function saveResultToServer(){
  try{
    await api('/api/results', {method:'POST', body:{
      examType: state.examType, total: results.total, pct: results.pct, grade: results.grade, catScores: results.catScores
    }});
    await loadHistory();
  }catch(e){ /* non-fatal — result still shown even if save fails */ }
}

function restart(){
  playClick();
  state.screen = 'examType';
  render();
}

/* ============ RENDER ============ */
function render(){
  const app = document.getElementById('app');
  if(state.screen==='loading-init') app.innerHTML = renderInitLoading();
  else if(state.screen==='auth') app.innerHTML = renderAuth();
  else if(state.screen==='dashboard') app.innerHTML = renderDashboard();
  else if(state.screen==='examType') app.innerHTML = renderExamType();
  else if(state.screen==='question') app.innerHTML = renderQuestion();
  else if(state.screen==='loading') app.innerHTML = renderLoading();
  else if(state.screen==='result'){ app.innerHTML = renderResult(); drawChart(); }
}

function renderInitLoading(){
  return `<div class="card" style="text-align:center;"><div class="loading-text">Loading StressMap…</div></div>`;
}

function renderAuth(){
  const isLogin = state.authMode === 'login';
  return `
  <div class="card">
    <div class="brand"><div class="dot"></div><h1>StressMap</h1></div>
    <div class="eyebrow">Exam Stress Check-In</div>
    <p class="sub">A quiet few-minute check-in for NEET, JEE, UPSC and other exam aspirants — built to understand your daily life, not to judge your marks.</p>
    <div class="tabs">
      <div class="tab ${isLogin?'active':''}" onclick="setAuthMode('login')">Log in</div>
      <div class="tab ${!isLogin?'active':''}" onclick="setAuthMode('register')">Create account</div>
    </div>
    ${isLogin ? `
      <label>Name</label>
      <input type="text" id="loginName" placeholder="e.g. Aarav Sharma">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Your password">
      <div class="error">${state.authErr}</div>
      <button class="btn" onclick="doLogin()">Log in</button>
    ` : `
      <label>Name</label>
      <input type="text" id="regName" placeholder="e.g. Aarav Sharma">
      <label>Mobile number</label>
      <input type="tel" id="regMobile" placeholder="10-digit mobile number" maxlength="10">
      <label>Set password</label>
      <input type="password" id="regPassword" placeholder="At least 6 characters">
      <div class="error">${state.authErr}</div>
      <button class="btn" onclick="doRegister()">Create account</button>
    `}
  </div>`;
}

function renderDashboard(){
  const firstName = state.name.split(' ')[0];
  const histBlock = history.length ? history.map(r=>{
    const d = new Date(r.created_at);
    const dateStr = d.toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'});
    const gradeColors = {'A+':'#2FAF98','A':'#4E9E76','B':'#F5A93C','C':'#D9762E','D':'#EF6F6C'};
    return `<div class="history-item">
      <div class="history-left">
        <div><b>${r.exam_type || 'Check-in'}</b> · Stress ${r.pct}%</div>
        <div class="history-date">${dateStr}</div>
      </div>
      <div class="mini-badge" style="background:${gradeColors[r.grade]||'#5C6F68'}">${r.grade}</div>
    </div>`;
  }).join('') : `<div class="empty-hist">No check-ins yet. Your first one takes about 3 minutes.</div>`;

  return `
  <div class="card">
    <div class="dash-row">
      <div class="brand"><div class="dot"></div><h1>StressMap</h1></div>
      <button class="btn ghost" style="width:auto; margin:0; padding:8px 14px; font-size:13px;" onclick="doLogout()">Log out</button>
    </div>
    <div class="eyebrow">Welcome back</div>
    <h2 style="margin-top:6px;">Hi ${firstName} 👋</h2>
    <p class="sub">Ready for a fresh check-in, or take a look at how things have trended over time.</p>
    <button class="btn" onclick="pickExamScreen()">Start a new check-in</button>
    <div style="margin-top:26px;">
      <div class="eyebrow">Your history</div>
      ${histBlock}
    </div>
    <div class="footer-note">
      This is a self-reflection tool, not a medical diagnosis. If things feel heavy, please talk to a trusted adult, teacher, or counsellor — you don't have to manage this alone.
    </div>
  </div>`;
}

function pickExamScreen(){
  playClick();
  state.screen = 'examType';
  render();
}

function renderExamType(){
  const exams = ['NEET','JEE','UPSC / Govt Exam','Other'];
  return `
  <div class="card">
    <div class="eyebrow">Before we start</div>
    <h2 style="margin-top:6px;">Which exam are you preparing for?</h2>
    <p class="sub">This just helps us tailor a couple of the questions ahead.</p>
    <div class="exam-grid">
      ${exams.map(e=>`<div class="exam-opt" onclick="pickExam('${e}')">${e}</div>`).join('')}
    </div>
    <button class="btn ghost" style="margin-top:18px;" onclick="goToDashboard()">Back</button>
  </div>`;
}

function renderQuestion(){
  const q = getCurrentQuestion();
  const cat = categories[state.catIdx];
  const qNum = state.catIdx*5 + state.subIdx + 1;
  const pct = Math.round((qNum-1)/25*100);
  return `
  <div class="card">
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="qcount">${qNum}/25</div>
    </div>
    <div class="cat-tag">${cat.emoji} ${cat.title}</div>
    <div class="qtext">${q.text}</div>
    <div class="option-list">
      ${q.options.map((o,i)=>`<button class="option" onclick="answerQuestion(${i})">${o.label}</button>`).join('')}
    </div>
  </div>`;
}

function renderLoading(){
  return `
  <div class="card" style="text-align:center; padding:48px 28px;">
    <div class="pulse-wrap">
      <svg width="140" height="50" viewBox="0 0 140 50">
        <polyline points="0,25 30,25 40,8 50,42 60,25 90,25 100,12 110,38 120,25 140,25"
          fill="none" stroke="#2FAF98" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
          stroke-dasharray="220" stroke-dashoffset="220">
          <animate attributeName="stroke-dashoffset" from="220" to="0" dur="1.1s" repeatCount="indefinite"/>
        </polyline>
      </svg>
    </div>
    <h2>Calculating your stress index…</h2>
    <div class="loading-text">Putting together your result card, one category at a time.</div>
  </div>`;
}

function renderResult(){
  const r = results;
  const rows = categories.map(c=>{
    const score = r.catScores[c.key];
    const marks = Math.round(score/15*20);
    const pct = Math.round(score/15*100);
    const meta = catMeta[c.key];
    return `<tr>
      <td>${c.emoji} ${meta.label}</td>
      <td class="mono" style="width:56px;">${marks}/20</td>
      <td style="width:110px;"><div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${meta.color}"></div></div></td>
    </tr>`;
  }).join('');

  const tipsBlock = r.topCats.map(k=>{
    const meta = catMeta[k];
    return `<div style="margin-top:16px;">
      <div class="eyebrow" style="color:${meta.color}">Focus area · ${meta.label}</div>
      <ul class="tips-list">${meta.tips.map(t=>`<li>${t}</li>`).join('')}</ul>
    </div>`;
  }).join('');

  const videoBlock = r.topCats.map(k=>{
    const meta = catMeta[k];
    return meta.videos.map(v=>`
      <a class="yt-card" href="https://www.youtube.com/results?search_query=${encodeURIComponent(v.q)}" target="_blank" rel="noopener">
        <div class="yt-icon">▶</div>
        <div><div class="yt-title">${v.t}</div><div class="yt-sub">Search on YouTube</div></div>
      </a>`).join('');
  }).join('');

  return `
  <div class="card">
    <div class="result-header">
      <div class="eyebrow">${state.examType} Stress Result Card</div>
      <h2 style="margin-top:4px;">${state.name.split(' ')[0]}'s Check-In</h2>
      <div class="grade-badge" style="background:${r.gradeColor}">${r.grade}</div>
      <div class="stress-pct">Stress Index: ${r.pct}%</div>
    </div>

    <canvas id="resultChart" height="220"></canvas>

    <table class="marksheet">
      <thead><tr><th>Category</th><th>Marks</th><th>Level</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>

    <div class="remarks"><b>Remarks:</b> ${r.remark}</div>

    ${tipsBlock}

    <div style="margin-top:20px;">
      <div class="eyebrow">Suggested for you</div>
      ${videoBlock}
    </div>

    <div class="footer-note">
      This is a self-reflection tool, not a medical diagnosis. If things feel heavy, please talk to a trusted adult, teacher, or counsellor — you don't have to manage this alone.
    </div>

    <button class="btn secondary" style="margin-top:18px;" onclick="restart()">Take the check-in again</button>
    <button class="btn ghost" onclick="goToDashboard()">Back to dashboard</button>
  </div>`;
}

let chartInstance = null;
function drawChart(){
  const ctx = document.getElementById('resultChart');
  if(!ctx || !window.Chart) return;
  if(chartInstance){ chartInstance.destroy(); }
  chartInstance = new Chart(ctx, {
    type:'radar',
    data:{
      labels: categories.map(c=>c.title),
      datasets:[{
        label:'Stress level',
        data: categories.map(c=> Math.round(results.catScores[c.key]/15*100)),
        backgroundColor:'rgba(239,111,108,0.15)',
        borderColor:'#EF6F6C',
        pointBackgroundColor:'#EF6F6C',
        borderWidth:2
      }]
    },
    options:{
      responsive:true,
      plugins:{ legend:{display:false} },
      scales:{ r:{ min:0, max:100, ticks:{ display:false }, grid:{ color:'#E4DFCB' }, angleLines:{ color:'#E4DFCB' },
        pointLabels:{ font:{ size:10.5, family:'IBM Plex Sans' }, color:'#5C6F68' } } }
    }
  });
}

checkSession();
</script>
</body>
</html>
